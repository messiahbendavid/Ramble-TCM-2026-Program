<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramble–TCM 2026 Program Schedule</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --bg-dark: #1a120b;
  --bg-darker: #110c07;
  --bg-panel: #2c1f14;
  --bg-card: #3d2b1f;
  --bg-card-hover: #4a3728;
  --text-light: #f5e6c8;
  --text-muted: #9a8060;
  --accent-copper: #b87333;
  --accent-gold: #c9a227;
  --border-main: #4a3728;
  --font-heading: 'Orbitron', sans-serif;
  --font-body: 'Share Tech Mono', 'Courier New', monospace;
  --sidebar-w: 300px;
  --header-h: 110px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow-y:auto; }
body { background:var(--bg-darker); color:var(--text-light); font-family:var(--font-body); }

.top-bar {
  position:fixed; top:0; left:0; right:0; height:var(--header-h);
  background:linear-gradient(135deg,var(--bg-darker) 0%,#3d2b1f 50%,var(--bg-darker) 100%);
  border-bottom:4px solid var(--accent-copper);
  display:flex; align-items:center; padding:0 2rem; z-index:1000;
}
.top-bar::before {
  content:''; position:absolute; inset:0;
  background:repeating-linear-gradient(90deg,transparent,transparent 60px,rgba(184,115,51,0.04) 60px,rgba(184,115,51,0.04) 61px);
  pointer-events:none;
}
.menu-toggle {
  display:none; background:none; border:1px solid var(--accent-copper);
  color:var(--accent-gold); font-size:1.4rem; padding:6px 12px;
  border-radius:4px; cursor:pointer; margin-right:1.5rem;
  font-family:var(--font-body); transition:all 0.2s; position:relative; z-index:1;
}
.menu-toggle:hover { background:var(--accent-copper); color:#fff; }
.title-content { flex:1; text-align:center; position:relative; z-index:1; }
.main-title {
  font-family:var(--font-heading); font-size:2.2rem; font-weight:900;
  color:var(--accent-gold); text-transform:uppercase; letter-spacing:4px;
  text-shadow:0 2px 8px rgba(0,0,0,0.5); line-height:1.2;
}
.title-meta {
  display:flex; align-items:center; justify-content:center;
  gap:1.5rem; margin-top:0.5rem; flex-wrap:wrap;
}
.subtitle { font-family:var(--font-body); font-size:0.8rem; color:var(--text-muted); letter-spacing:1px; }
.viewing-badge {
  font-family:var(--font-heading); font-size:0.65rem; color:var(--accent-copper);
  letter-spacing:1.5px; text-transform:uppercase;
  padding:5px 14px; border:1px solid rgba(184,115,51,0.4);
  border-radius:4px; background:rgba(184,115,51,0.08); white-space:nowrap;
}
.viewing-badge.is-current { border-color:var(--accent-gold); color:var(--accent-gold); background:rgba(201,162,39,0.1); }

.sidebar {
  position:fixed; top:var(--header-h); left:0; bottom:0;
  width:var(--sidebar-w); background:var(--bg-panel);
  border-right:2px solid var(--border-main);
  display:flex; flex-direction:column; z-index:900; transition:transform 0.3s ease;
}
.sidebar-header { padding:1.4rem 1.2rem 1rem; border-bottom:1px solid var(--border-main); flex-shrink:0; }
.sidebar-header h2 {
  font-family:var(--font-heading); font-size:0.7rem; font-weight:600;
  color:var(--accent-gold); text-transform:uppercase; letter-spacing:2px;
}
.sidebar-hint { font-size:0.68rem; color:var(--text-muted); margin-top:0.4rem; line-height:1.4; }
.version-count {
  display:inline-block; font-family:var(--font-heading); font-size:0.5rem;
  background:var(--accent-copper); color:var(--bg-dark);
  padding:2px 7px; border-radius:10px; margin-left:0.5rem; font-weight:700; vertical-align:middle;
}
.version-list { flex:1; overflow-y:auto; padding:0.8rem; }
.version-list::-webkit-scrollbar { width:6px; }
.version-list::-webkit-scrollbar-track { background:var(--bg-dark); border-radius:3px; }
.version-list::-webkit-scrollbar-thumb { background:var(--accent-copper); border-radius:3px; }

.version-card {
  background:var(--bg-card); border:1px solid var(--border-main);
  border-radius:6px; padding:0.9rem 1rem; margin-bottom:0.5rem;
  cursor:pointer; transition:all 0.2s ease; position:relative; border-left:3px solid transparent;
}
.version-card:hover {
  background:var(--bg-card-hover); border-color:var(--accent-copper);
  transform:translateX(2px); box-shadow:0 2px 12px rgba(0,0,0,0.2);
}
.version-card.active {
  border-left-color:var(--accent-gold); background:rgba(201,162,39,0.1);
  box-shadow:0 0 16px rgba(201,162,39,0.1);
}
.version-card.active .v-name { color:var(--accent-gold); }
.v-name { font-family:var(--font-heading); font-size:0.8rem; font-weight:700; color:var(--text-light); letter-spacing:1px; }
.v-date { font-size:0.68rem; color:var(--text-muted); margin-top:0.3rem; }
.v-desc { font-size:0.68rem; color:var(--accent-copper); margin-top:0.35rem; line-height:1.4; font-style:italic; }
.badge {
  display:inline-block; font-family:var(--font-heading); font-size:0.45rem;
  font-weight:700; padding:2px 8px; border-radius:3px;
  letter-spacing:1px; text-transform:uppercase; margin-left:0.6rem; vertical-align:middle;
}
.badge-current { background:var(--accent-gold); color:var(--bg-dark); }

/* ─── CONTENT — relative so the page can scroll when iframe expands ─── */
.content {
  position:relative;
  margin-top:var(--header-h);
  margin-left:var(--sidebar-w);
  background:#f5e6c8;
}
#scheduleFrame {
  display:block; border:none; width:100%;
  height:calc(100vh - var(--header-h) - 18px);
  min-height:200px;
  pointer-events:auto;        /* guarantee clicks reach the iframe */
}

/* ─── TRANSPARENT SHIELD — sits over iframe ONLY during parent resize drag
       so the parent keeps receiving mousemove; hidden otherwise ─── */
.iframe-shield {
  display:none; position:absolute; top:0; left:0; right:0; bottom:18px;
  z-index:10; cursor:ns-resize;
}
.iframe-shield.active { display:block; }

/* ─── IFRAME RESIZE HANDLE ─── */
.iframe-resize-handle {
  height:18px; cursor:ns-resize;
  background:linear-gradient(135deg,#3d2b1f,#2c1f14);
  border-top:2px solid var(--accent-copper);
  display:flex; align-items:center; justify-content:center;
  user-select:none; transition:background 0.15s; position:relative;
}
.iframe-resize-handle:hover,
.iframe-resize-handle:active { background:var(--accent-copper); }
.iframe-resize-handle::after {
  content:''; width:50px; height:4px;
  border-top:2px solid rgba(196,168,130,0.5);
  border-bottom:2px solid rgba(196,168,130,0.5);
}
.iframe-resize-handle .handle-hint {
  position:absolute; left:1rem;
  font-family:var(--font-heading); font-size:0.45rem;
  color:var(--text-muted); letter-spacing:1px;
  text-transform:uppercase; pointer-events:none;
}
.iframe-resize-handle .handle-btn {
  position:absolute; right:1rem;
  font-family:var(--font-heading); font-size:0.5rem;
  color:var(--accent-gold); background:none;
  border:1px solid rgba(184,115,51,0.4);
  padding:1px 8px; border-radius:3px;
  cursor:pointer; letter-spacing:1px; transition:all 0.15s;
}
.iframe-resize-handle .handle-btn:hover {
  background:var(--accent-copper); color:#fff; border-color:var(--accent-copper);
}
.iframe-resize-handle .height-indicator {
  position:absolute; top:-28px; left:50%; transform:translateX(-50%);
  font-family:var(--font-heading); font-size:0.55rem;
  color:var(--accent-gold); background:var(--bg-dark);
  border:1px solid var(--accent-copper); border-radius:4px;
  padding:2px 10px; white-space:nowrap; pointer-events:none;
  opacity:0; transition:opacity 0.15s;
}
.iframe-resize-handle .height-indicator.visible { opacity:1; }

/* ─── LOADING OVERLAY — fixed so it always covers the viewport ─── */
.loading-overlay {
  position:fixed; top:var(--header-h); left:var(--sidebar-w); right:0; bottom:0;
  background:var(--bg-dark);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:60; transition:opacity 0.4s ease;
}
.loading-overlay.hidden { opacity:0; pointer-events:none; }
.spinner {
  width:44px; height:44px; border:3px solid var(--border-main);
  border-top-color:var(--accent-gold); border-radius:50%; animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading-text {
  font-family:var(--font-heading); font-size:0.65rem; color:var(--text-muted);
  margin-top:1.2rem; letter-spacing:2px; text-transform:uppercase;
}

.error-state {
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; background:var(--bg-dark); text-align:center; padding:2rem;
}
.error-icon { font-size:3rem; margin-bottom:1rem; opacity:0.7; }
.error-title { font-family:var(--font-heading); font-size:0.9rem; color:var(--accent-gold); letter-spacing:2px; margin-bottom:0.6rem; }
.error-hint { font-size:0.72rem; color:var(--text-muted); max-width:420px; line-height:1.6; }
.error-hint code { background:rgba(184,115,51,0.15); color:var(--accent-copper); padding:1px 6px; border-radius:3px; }

.sidebar-backdrop { display:none; position:fixed; inset:0; z-index:899; background:rgba(0,0,0,0.5); }
.sidebar-footer {
  padding:0.8rem 1.2rem; border-top:1px solid var(--border-main);
  font-size:0.55rem; color:var(--text-muted); text-align:center;
  font-family:var(--font-heading); letter-spacing:1px; flex-shrink:0;
}

@media (max-width:960px) {
  :root { --header-h:80px; }
  .menu-toggle { display:block; }
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); box-shadow:6px 0 30px rgba(0,0,0,0.5); }
  .sidebar.open ~ .sidebar-backdrop { display:block; }
  .content { margin-left:0; }
  .loading-overlay { left:0; }
  .main-title { font-size:1.3rem; letter-spacing:2px; }
  .subtitle { display:none; }
}
@media (max-width:500px) {
  :root { --sidebar-w:280px; --header-h:70px; }
  .main-title { font-size:1rem; letter-spacing:1px; }
}
</style>
</head>
<body>

<header class="top-bar">
  <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu">☰</button>
  <div class="title-content">
    <div class="main-title">Ramble–TCM 2026 Program Schedule</div>
    <div class="title-meta">
      <span class="subtitle">Master Construction &amp; Procurement Timeline</span>
      <span class="viewing-badge" id="headerBadge">Loading…</span>
    </div>
  </div>
</header>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>Schedule Versions <span class="version-count" id="versionCount">0</span></h2>
    <p class="sidebar-hint">Select a weekly snapshot to view.</p>
  </div>
  <div class="version-list" id="versionList"></div>
  <div class="sidebar-footer">© 2026 Ramble × TCM — Confidential</div>
</aside>
<div class="sidebar-backdrop" id="backdrop"></div>

<main class="content" id="content">
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text">Loading schedule…</div>
  </div>
  <!-- shield is invisible and pointer-events:none EXCEPT while a resize-drag
       is in progress — that stops the iframe from swallowing mousemove -->
  <div class="iframe-shield" id="iframeShield"></div>
  <iframe id="scheduleFrame" title="Schedule View"></iframe>
  <div class="iframe-resize-handle" id="iframeResizeHandle"
       title="Drag to resize — double-click to reset">
    <span class="handle-hint">↕ DRAG TO RESIZE</span>
    <span class="height-indicator" id="heightIndicator"></span>
    <button class="handle-btn" id="iframeExpandBtn">EXPAND</button>
  </div>
</main>

<script>
(function () {
  var sidebar  = document.getElementById('sidebar');
  var backdrop = document.getElementById('backdrop');
  var menuToggle = document.getElementById('menuToggle');
  var versionList = document.getElementById('versionList');
  var versionCount = document.getElementById('versionCount');
  var frame    = document.getElementById('scheduleFrame');
  var loading  = document.getElementById('loadingOverlay');
  var headerBadge = document.getElementById('headerBadge');
  var versions = [];
  var activeId = null;

  menuToggle.addEventListener('click', function () { sidebar.classList.toggle('open'); });
  backdrop.addEventListener('click', function () { sidebar.classList.remove('open'); });

  frame.addEventListener('load', function () {
    setTimeout(function () { loading.classList.add('hidden'); sidebar.classList.remove('open'); }, 300);
  });

  function getUrlVersion () { return new URLSearchParams(window.location.search).get('v'); }
  function setUrlVersion (id) {
    var url = new URL(window.location); url.searchParams.set('v', id);
    window.history.pushState({ v: id }, '', url);
  }
  function loadVersion (id) {
    var ver = versions.find(function (v) { return v.id === id; });
    if (!ver) return;
    activeId = id; setUrlVersion(id);
    loading.classList.remove('hidden');
    frame.src = ver.file;
    headerBadge.textContent = ver.version;
    headerBadge.classList.toggle('is-current', !!ver.current);
    document.querySelectorAll('.version-card').forEach(function (c) {
      c.classList.toggle('active', c.dataset.id === id);
    });
    window.scrollTo({ top: 0 });
  }
  function renderVersions () {
    versionList.innerHTML = ''; versionCount.textContent = versions.length;
    versions.forEach(function (v) {
      var card = document.createElement('div'); card.className = 'version-card'; card.dataset.id = v.id;
      var badges = v.current ? '<span class="badge badge-current">Latest</span>' : '';
      card.innerHTML =
        '<div class="v-name">' + esc(v.version) + badges + '</div>' +
        '<div class="v-date">Published: ' + esc(v.date) + '</div>' +
        (v.description ? '<div class="v-desc">' + esc(v.description) + '</div>' : '');
      card.addEventListener('click', function () { loadVersion(v.id); });
      versionList.appendChild(card);
    });
  }
  function esc (s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

  fetch('versions.json?_=' + Date.now())
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function (data) {
      versions = data.sort(function (a, b) { return b.date.localeCompare(a.date); });
      renderVersions();
      var urlVer = getUrlVersion();
      var match  = urlVer && versions.find(function (v) { return v.id === urlVer; });
      var target = match ? match.id : (versions.find(function (v) { return v.current; }) || versions[0]).id;
      loadVersion(target);
    })
    .catch(function (err) {
      console.error(err);
      loading.innerHTML =
        '<div class="error-state"><div class="error-icon">⚠</div>' +
        '<div class="error-title">Cannot Load Versions</div>' +
        '<div class="error-hint">Could not load <code>versions.json</code></div></div>';
    });

  window.addEventListener('popstate', function () {
    var v = getUrlVersion(); if (v && v !== activeId) loadVersion(v);
  });

  /* ═══════════════════════════════════════════════════════
     CROSS-FRAME EVENT FORWARDING
     – Keeps the schedule's grab-to-pan working even when
       the cursor momentarily leaves the iframe (e.g. over
       the resize handle).
     ═══════════════════════════════════════════════════════ */
  document.addEventListener('mouseup', function () {
    try {
      var doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
      if (doc) doc.dispatchEvent(new MouseEvent('mouseup', { bubbles: true }));
    } catch (e) { /* cross-origin — ignore */ }
  });

  document.addEventListener('mousemove', function (e) {
    // Only forward when nothing on the parent is being dragged
    if (parentResizing) return;
    try {
      var doc = frame.contentDocument || (frame.contentWindow && frame.contentWindow.document);
      if (!doc) return;
      var r = frame.getBoundingClientRect();
      doc.dispatchEvent(new MouseEvent('mousemove', {
        bubbles: true,
        clientX: e.clientX - r.left,
        clientY: e.clientY - r.top
      }));
    } catch (e2) { /* cross-origin — ignore */ }
  });

  /* ═══════════════════════════════════════════════════════
     IFRAME RESIZE HANDLE
     ═══════════════════════════════════════════════════════ */
  var parentResizing = false;           // shared flag read by forwarder above

  (function () {
    var handle    = document.getElementById('iframeResizeHandle');
    var expandBtn = document.getElementById('iframeExpandBtn');
    var indicator = document.getElementById('heightIndicator');
    var shield    = document.getElementById('iframeShield');
    var startY = 0, startH = 0, isExpanded = false, hideTimer = null;

    function defaultH () {
      var hh = parseFloat(getComputedStyle(document.documentElement)
                   .getPropertyValue('--header-h')) || 110;
      return window.innerHeight - hh - 18;
    }

    function showIndicator (h) {
      indicator.textContent = Math.round(h) + 'px';
      indicator.classList.add('visible');
      clearTimeout(hideTimer);
    }
    function hideIndicator () {
      hideTimer = setTimeout(function () { indicator.classList.remove('visible'); }, 600);
    }

    /* ── Mouse drag ── */
    handle.addEventListener('mousedown', function (e) {
      if (e.target === expandBtn) return;
      parentResizing = true;
      startY = e.clientY;
      startH = frame.offsetHeight;
      shield.classList.add('active');          // cover iframe so we keep getting mousemove
      document.body.style.cursor = 'ns-resize';
      document.body.style.userSelect = 'none';
      e.preventDefault();
    });

    document.addEventListener('mousemove', function (e) {
      if (!parentResizing) return;
      var newH = Math.max(200, startH + (e.clientY - startY));
      frame.style.height = newH + 'px';
      showIndicator(newH);
      e.preventDefault();
    });

    document.addEventListener('mouseup', function () {
      if (!parentResizing) return;
      parentResizing = false;
      shield.classList.remove('active');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      hideIndicator();
      isExpanded = frame.offsetHeight > defaultH() + 20;
      expandBtn.textContent = isExpanded ? 'RESET' : 'EXPAND';
    });

    /* ── Touch drag ── */
    handle.addEventListener('touchstart', function (e) {
      if (e.target === expandBtn) return;
      parentResizing = true;
      startY = e.touches[0].clientY;
      startH = frame.offsetHeight;
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', function (e) {
      if (!parentResizing) return;
      var newH = Math.max(200, startH + (e.touches[0].clientY - startY));
      frame.style.height = newH + 'px';
      showIndicator(newH);
    });

    document.addEventListener('touchend', function () {
      if (!parentResizing) return;
      parentResizing = false;
      hideIndicator();
      isExpanded = frame.offsetHeight > defaultH() + 20;
      expandBtn.textContent = isExpanded ? 'RESET' : 'EXPAND';
    });

    /* ── Double-click to reset ── */
    handle.addEventListener('dblclick', function (e) {
      if (e.target === expandBtn) return;
      frame.style.height = '';
      isExpanded = false;
      expandBtn.textContent = 'EXPAND';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    /* ── Expand / Reset button ── */
    expandBtn.addEventListener('click', function (e) {
      e.stopPropagation();
      if (!isExpanded) {
        frame.style.height = (defaultH() * 2) + 'px';
        expandBtn.textContent = 'RESET';
        isExpanded = true;
      } else {
        frame.style.height = '';
        expandBtn.textContent = 'EXPAND';
        isExpanded = false;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });

    /* ── Escape to restore ── */
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape' && isExpanded) {
        frame.style.height = '';
        expandBtn.textContent = 'EXPAND';
        isExpanded = false;
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  })();
})();
</script>
</body>
</html>
